<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IBERTI - Publicación WhatsApp</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4.1.7"></script>
    <script src="https://unpkg.com/@babel/standalone@7.26.10/babel.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "react": "https://esm.sh/react@18.3.1",
            "react/": "https://esm.sh/react@18.3.1/",
            "react-dom": "https://esm.sh/react-dom@18.3.1",
            "react-dom/": "https://esm.sh/react-dom@18.3.1/",
            "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
            "lucide-react": "https://esm.sh/lucide-react@0.474.0?external=react"
        }
    }
    </script>
</head>
<body class="bg-gray-100 font-sans text-gray-900 m-0 p-0">
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="react">
        import React from 'react';
        import { createRoot } from 'react-dom/client';

        function App() {
            return (
                <div className="max-w-[600px] mx-auto bg-gray-300">
                    
                    {/* Cabecera Logo */}
                    <div className="text-center py-8 px-5 bg-gray-300 border-b-4 border-blue-700">
                        <img 
                            src="https://lh3.googleusercontent.com/u/0/d/1Pcuxm_b8WKpQKuMYzo5f8MxwtHVCfYrz" 
                            alt="IBERTI Ingeniería & Comunicación Visual" 
                            className="max-w-[200px] h-auto mx-auto object-contain"
                            onError={(e) => {
                                e.target.onerror = null;
                                e.target.src = "https://via.placeholder.com/200x80?text=IBERTI+Logo";
                            }}
                        />
                    </div>

                    {/* Imagen Principal o Hero */}
                    <div className="relative bg-black text-white text-center">
                        <img 
                            src="https://lh3.googleusercontent.com/u/0/d/1BqbdTEm3xlx0OAxnN9tWhWOLyXiFeKyc" 
                            alt="Pantalla Digital LED de Vanguardia" 
                            className="w-full h-auto block opacity-85 object-cover"
                            onError={(e) => {
                                e.target.onerror = null;
                                e.target.src = "https://via.placeholder.com/600x400?text=Pantalla+LED+Arabial";
                            }}
                        />
                        <div className="p-10 px-5 bg-gradient-to-t from-black/90 to-black/10 absolute bottom-0 w-full flex flex-col justify-end">
                            <h1 className="m-0 text-[28px] font-bold leading-tight uppercase tracking-wider">Haz que tu marca destaque</h1>
                            <p className="text-[16px] text-slate-100 mt-4 font-light leading-relaxed">
                                Garantiza visibilidad total en una de las arterias principales de Granada. Nuestra pantalla LED digital en la Glorieta de Arabial conecta tu mensaje con miles de personas al día.
                            </p>
                        </div>
                    </div>

                    {/* Impactos / Estadísticas */}
                    <div className="bg-gray-400 py-10 px-8 text-center pt-16">
                        <h2 className="text-[22px] text-black mt-0 mb-6 font-bold">Alcance y visibilidad</h2>
                        <div className="flex flex-row flex-wrap justify-between w-full">
                            <div className="w-[48%] mb-5">
                                <div className="text-[26px] font-bold text-blue-800">+45.000</div>
                                <div className="text-[14px] text-gray-900 mt-1 font-semibold">Vehículos al día</div>
                            </div>
                            <div className="w-[48%] mb-5">
                                <div className="text-[26px] font-bold text-blue-800">+8.000</div>
                                <div className="text-[14px] text-gray-900 mt-1 font-semibold">Peatones al día</div>
                            </div>
                        </div>
                        <div className="text-[15px] text-gray-800 mt-4 font-medium">
                            Situada en plena zona comercial y residencial con total exposición desde el Camino de Ronda.
                        </div>
                    </div>

                    {/* Características Técnicas */}
                    <div className="py-10 px-8 bg-gray-300">
                        <div className="mb-6">
                            <h3 className="text-black text-[18px] m-0 mb-2.5 border-l-4 border-blue-700 pl-2.5 font-bold">Formato Espectacular (8×3 metros)</h3>
                            <p className="text-gray-900 text-[15px] leading-relaxed m-0 ml-3.5">
                                Creatividad dinámica e impactante. Puedes realizar cambios rápidos de arte o comunicar varias ofertas a lo largo del mes gracias a las ventajas del soporte digital.
                            </p>
                        </div>
                        <div className="mb-6">
                            <h3 className="text-black text-[18px] m-0 mb-2.5 border-l-4 border-blue-700 pl-2.5 font-bold">Impacto Asegurado en cada Emisión</h3>
                            <p className="text-gray-900 text-[15px] leading-relaxed m-0 ml-3.5">
                                Garantía de exposición. Cada anunciante se muestra de manera <strong>fija durante 2 minutos</strong> completos antes de dar paso al siguiente anuncio, un tiempo de fijación muy superior al estándar del sector para captar firmemente la atención.
                            </p>
                        </div>
                        <div className="mb-6">
                            <h3 className="text-black text-[18px] m-0 mb-2.5 border-l-4 border-blue-700 pl-2.5 font-bold">El valor del "DOOH" (Digital Out of Home)</h3>
                            <p className="text-gray-900 text-[15px] leading-relaxed m-0 ml-3.5">
                                Llega a clientes potenciales mientras están en movimiento, con mentalidad activa y poder de decisión.
                            </p>
                        </div>
                    </div>

                    {/* Imagen de transición */}
                    <div className="w-full border-t-[5px] border-b-[5px] border-blue-700">
                        <img 
                            src="https://lh3.googleusercontent.com/u/0/d/1rHsVOI7CsqWBctEYyYMRcUjzE5jcLwUF" 
                            alt="Pantalla LED Caja Granada" 
                            className="w-full h-auto block object-cover"
                            onError={(e) => {
                                e.target.onerror = null;
                                e.target.src = "https://via.placeholder.com/600x200?text=Pantalla+LED+Caja+Granada";
                            }}
                        />
                    </div>

                    {/* Tarifas */}
                    <div className="bg-slate-900 text-white py-10 px-8 text-center">
                        <h2 className="mt-0 text-sky-400 text-[24px] font-bold mb-2">Flexibilidad de Contratación</h2>
                        <p className="text-slate-300 text-[15px] mb-8">Adaptamos nuestras tarifas al ciclo de vida de tus campañas locales.</p>
                        
                        <div className="bg-white/10 rounded-lg p-5 my-5 border border-white/20">
                            <div className="text-[32px] font-bold text-white">
                                495 € <span className="text-[16px] font-normal">/mes*</span>
                            </div>
                            <div className="text-[14px] text-slate-200 mt-1">Planes Anuales — Excelente para afianzar marca.</div>
                        </div>
                        
                        <div className="bg-white/10 rounded-lg p-5 my-5 border border-white/20">
                            <div className="text-[32px] font-bold text-white">
                                595 € <span className="text-[16px] font-normal">/mes*</span>
                            </div>
                            <div className="text-[14px] text-slate-200 mt-1">Meses Sueltos — Ideal para promociones y picos estacionales.</div>
                        </div>
                        <p className="text-slate-400 text-[12px] mt-5">
                            *Precios sin IVA. Disponibilidad de espacios limitada debido al sistema de rotación exclusiva.
                        </p>
                    </div>

                    {/* Llamada a la acción */}
                    <div className="py-10 px-8 text-center bg-gray-300 pb-12">
                        <h2 className="mt-0 text-black text-[22px] font-bold mb-3">¿Listo para llevar tu marca al siguiente nivel?</h2>
                        <p className="text-gray-900 mb-8 font-medium">Estás a un paso de situar tu empresa en el mejor balcón visual de Granada.</p>
                        <div className="flex flex-col gap-4 sm:flex-row justify-center">
                            <a 
                                href="mailto:evarodriguez@iberti.es?subject=Reserva%20Pantalla%20LED%20Arabial" 
                                className="inline-block bg-blue-700 text-white no-underline py-4 px-8 text-[16px] font-bold rounded uppercase tracking-wider hover:bg-blue-800 transition-colors"
                            >
                                Reservar mi Espacio
                            </a>
                            <a 
                                href="https://wa.me/34699674068" 
                                className="inline-block bg-[#25d366] text-white no-underline py-4 px-8 text-[16px] font-bold rounded uppercase tracking-wider hover:bg-[#20bd5a] transition-colors"
                            >
                                Enviar WhatsApp
                            </a>
                        </div>
                    </div>

                    {/* Pie de página */}
                    <div className="bg-gray-400 text-center py-5 px-5 text-[12px] text-gray-900 border-t border-gray-500">
                        <img 
                            src="https://lh3.googleusercontent.com/u/0/d/1Pcuxm_b8WKpQKuMYzo5f8MxwtHVCfYrz" 
                            alt="Letras Logo" 
                            className="w-[120px] mx-auto grayscale opacity-60 mb-2.5"
                            onError={(e) => {
                                e.target.onerror = null;
                                e.target.src = "https://via.placeholder.com/120x40?text=Logo";
                            }}
                        />
                        <div className="mt-2 text-gray-800">
                            <strong>IBERTI Ingeniería & Comunicación Visual</strong><br />
                            Este correo se ha enviado porque estás dado de alta en nuestra base de datos comercial.<br />
                            <br />
                            <a href="#" className="text-blue-800 font-bold hover:underline">Darse de baja de esta lista</a>
                        </div>
                    </div>
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
